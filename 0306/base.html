<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Test Portail</title>
</head>
<body>

<button onclick="testDelete()">Supprimer équipement</button>

<script>
const APP_URL = "COLLER_URL_APPS_SCRIPT";

async function callApps(action, payload){
  const res = await fetch(APP_URL,{
    method:"POST",
    body: JSON.stringify({action,...payload})
  });
  return res.json();
}

async function testDelete(){
  const code = prompt("Code admin ?");
  const auth = await callApps("authCode",{code});

  if(!auth.ok){ alert("Code invalide"); return; }

  await callApps("deleteEquipement",{equipId:1, code});
  alert("Suppression OK");
}
</script>

</body>
</html>
